server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Garante que JS seja servido com o MIME type correto
    types {
        application/javascript js;
        text/css               css;
        text/html              html htm;
        image/jpeg             jpg jpeg;
        image/png              png;
        audio/mpeg             mp3;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Suporte a range requests para o player de áudio
    location ~* \.(mp3|ogg|wav)$ {
        add_header Accept-Ranges bytes;
    }
}
